[loggers]
keys=root,sampleLogger, customLogger

[handlers]
keys=consoleHandler,fileHandler, errorFileHandler

[formatters]
keys=sampleFormatter, infoFormatter

[logger_customLogger]
level=DEBUG
handlers=errorFileHandler
qualname=customLogger

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_sampleLogger]
level=DEBUG
handlers=fileHandler, errorFileHandler
qualname=sampleLogger
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=sampleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=infoFormatter
args=('example.log',)

; [handler_nullHandler]
; class=Handler
; level=DEBUG
; formatter=sampleFormatter

[handler_errorFileHandler]
class=FileHandler
level=ERROR
formatter=sampleFormatter
args=('error.log',)

[formatter_sampleFormatter]
format=%(asctime)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_infoFormatter]
format=%(asctime)s - %(levelname)s - row %(lineno)d - %(message)s
datefmt=%Y/%m/%d